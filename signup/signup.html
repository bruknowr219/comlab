<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | ComLab Monitoring System</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="signup-page">
    <div class="signup-left">
      <img src="computerlab.png" alt="Computer Lab Illustration">
      <h2>Join ComLab Monitoring System</h2>
      <p>Start managing your computer lab with real-time monitoring and secure administration.</p>
    </div>

    <div class="signup-right">
      <h1>Create Account</h1>
      <form action="#" method="post">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your name" required>

        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your password" required>

        <button type="submit" class="btn">Sign Up</button>
      </form>
      <p class="login-link">Already have an account? <a href="../login/login.html">Log in here</a></p>
      <p class="home-link"><a href="../index.html"><i class="bi bi-arrow-90deg-left"></i> Back to Home</a></p>
    </div>
  </div>
  <script src="signup.js"></script>
</body>
</html>
