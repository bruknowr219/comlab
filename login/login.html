<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ComLab Monitoring System</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="login-page">
    <div class="login-left">
      <img src="computerlab.png" alt="Computer Lab Illustration">
      <h2>Welcome Back</h2>
      <p>Log in to manage your computer lab with real-time monitoring and secure administration.</p>
    </div>

    <div class="login-right">
      <h1>Member Login</h1>
      <form action="#" method="post">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>

        <button type="submit" class="btn">Login</button>
      </form>
      <p class="forgot-link"><a href="#">Forgot Username / Password?</a></p>
      <p class="signup-link">Don't have an account? <a href="../signup/signup.html">Create your Account →</a></p>
      <p class="home-link"><a href="../index.html"> <i class="bi bi-arrow-90deg-left"></i> Back to Home</a></p>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
